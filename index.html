      function shouldLoadGA() {
        try {
          var consent = localStorage.getItem('fimart_cookie_consent');

          var prefs = JSON.parse(consent);
          return prefs.analytics === true;
        } catch (e) {
          return false;
        }
      }
      function loadGA() {
        if (window._gaLoaded || !shouldLoadGA()) return;
        window._gaLoaded = true;
        var s = document.createElement('script');
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-23CDTH1XW4';
        s.async = true;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', 'G-23CDTH1XW4');
      }
      setTimeout(loadGA, 3000);
      ['scroll','click','touchstart','keydown'].forEach(function(e){
        document.addEventListener(e, loadGA, {once:true,passive:true});
      });
    </script>

    <!-- Schema.org JSON-LD: FAQPage -->

        {
          "@type": "Question",
          "name": "¿Cuántas sesiones de fisioterapia necesito?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "El número de sesiones depende de la lesión y tu respuesta al tratamiento. En la primera valoración analizamos tu caso y establecemos un plan personalizado con objetivos claros. La mayoría de pacientes notan mejoras significativas entre la 3ª y 5ª sesión."
          }
        },
        {
          "@type": "Question",
          "name": "¿Duele la fisioterapia?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No debería doler. Nuestro objetivo es aliviar el dolor, no causarlo. Algunas técnicas como la punción seca pueden generar molestias momentáneas, pero siempre te explicamos el proceso y adaptamos la intensidad a tu tolerancia."
          }
        },
        {
          "@type": "Question",
          "name": "¿Necesito prescripción médica para ir al fisioterapeuta?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No, en España puedes acudir directamente al fisioterapeuta sin prescripción médica. En Clínica FIMART realizamos una valoración completa en la primera sesión para determinar el tratamiento más adecuado."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué tratamientos de fisioterapia ofrecen en Aspe?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "En Clínica FIMART Aspe ofrecemos terapia manual especializada, rehabilitación funcional, fisioterapia deportiva y pilates terapéutico. También contamos con tecnología avanzada como EPI, ecografía MSK, ondas de choque y diatermia TECAR."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuánto cuesta una sesión de fisioterapia en FIMART?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "El precio varía según el tratamiento. Ofrecemos una valoración inicial personalizada. Contacta por WhatsApp al 652 667 953 para conocer tarifas y disponibilidad."
          }
        },
        {
          "@type": "Question",
          "name": "¿Dónde está la clínica de fisioterapia FIMART?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Estamos en Calle Colón, 30 Bajo, 03680 Aspe (Alicante). Fácil acceso y parking cercano. Atendemos pacientes de Aspe, Novelda, Monforte del Cid, Elche y alrededores."
          }
        }
